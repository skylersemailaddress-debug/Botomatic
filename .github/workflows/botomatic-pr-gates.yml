name: Botomatic PR Gates

on:
  pull_request:
    branches:
      - main

jobs:
  pr-gates:
    name: Build, test, and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run -s build

      - name: Universal test suite
        run: npm run -s test:universal

      - name: Full validation
        run: npm run -s validate:all

      - name: Doctor checks
        run: npm run -s doctor
