name: Botomatic PR Gates

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  baseline-required-checks:
    name: Baseline required checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run -s build

      - name: Universal test suite
        run: npm run -s test:universal

      - name: Doctor checks
        run: npm run -s doctor

  strict-readiness-audit:
    name: Strict readiness audit (non-blocking baseline)
    runs-on: ubuntu-latest
    needs: baseline-required-checks
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Full validation
        run: npm run -s validate:all
