name: Phase 1 Baseline Truth Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - audit/**
      - .github/workflows/phase-1-baseline-truth-audit.yml
      - package.json
      - package-lock.json
      - apps/**
      - packages/**
      - scripts/**

permissions:
  contents: read

jobs:
  baseline-truth-audit:
    name: Baseline truth audit
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Run deterministic baseline suite
        shell: bash
        run: node scripts/phase1BaselineTruthAudit.mjs

      - name: Upload baseline evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-1-baseline-evidence
          path: |
            audit/baseline/logs/*.log
            audit/baseline/logs/*.exit
            audit/baseline/logs/exit-summary.txt
          if-no-files-found: warn
